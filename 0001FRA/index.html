<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraud Risk Assessment · Craig Mann, CCA, CCP, CFE, PMP</title>
<style>
  :root{
    --navy:#14343f; --navy2:#0f2831;
    --teal:#2c6f7e; --teald:#1f5966; --teall:#6ba3ad;
    --orange:#d1632b; --oranged:#b64a1f; --rust:#a83e26; --gold:#e8a11f;
    --paper:#ffffff; --card:#f4eee1; --peach:#fdf1e6; --peachb:#e9a05a;
    --ink:#1a1712; --muted:#4f473d; --line:#ddd6c6;
    --pageW:500px; --pageH:684px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Helvetica Neue',Arial,'Liberation Sans',sans-serif; color:var(--ink);
    background:radial-gradient(1200px 560px at 50% -8%, rgba(209,99,43,.10), transparent 60%),
      radial-gradient(circle at 50% 40%,#2a3a42 0%,#1b262c 55%,#121a1f 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;overflow-x:hidden;
  }
  .stage{display:flex;flex-direction:column;align-items:center;gap:15px;}
  .scaler{transform-origin:top center;}
  .book{transition:transform .85s cubic-bezier(.42,.12,.18,1);}
  .book.closed{transform:translateX(25%);}
  .book.single{transform:translateX(25%);}
  .book.single .side.right{opacity:0;}
  .book.single::after{display:none;}
  .book.closed::after{display:none;}
  .side.right{transition:opacity .5s ease .2s;}
  .book.closed .side.right{opacity:0;}
  .book.closed .side.left{border-radius:6px;
    box-shadow:inset -10px 0 20px -14px rgba(0,0,0,.45), 7px 0 0 -2px #e9e2d1, 12px 0 0 -3px #ddd4c0, 16px 0 0 -4px #d2c9b4;}
  .book{position:relative;width:calc(var(--pageW)*2);height:var(--pageH);perspective:3000px;filter:drop-shadow(0 22px 42px rgba(0,0,0,.5));}
  .book::after{content:"";position:absolute;top:0;bottom:0;left:50%;width:30px;transform:translateX(-50%);
    background:linear-gradient(90deg,rgba(0,0,0,.16),rgba(0,0,0,0) 45%,rgba(0,0,0,0) 55%,rgba(0,0,0,.16));z-index:30;pointer-events:none;}
  .side{position:absolute;top:0;width:var(--pageW);height:var(--pageH);overflow:hidden;background:var(--paper);border:1px solid var(--line);}
  .side.left{left:0;border-radius:5px 0 0 5px;box-shadow:inset -12px 0 24px -20px rgba(0,0,0,.5);}
  .side.right{left:var(--pageW);border-radius:0 5px 5px 0;box-shadow:inset 12px 0 24px -20px rgba(0,0,0,.5);}
  .flipper{position:absolute;top:0;width:var(--pageW);height:var(--pageH);transform-style:preserve-3d;
    transition:transform .95s cubic-bezier(.42,.12,.18,1);z-index:40;display:none;}
  .fface{position:absolute;inset:0;overflow:hidden;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--paper);border:1px solid var(--line);}
  .fface.fb{transform:rotateY(180deg);}
  .fface .shine{position:absolute;inset:0;pointer-events:none;opacity:0;background:linear-gradient(90deg,rgba(0,0,0,.28),rgba(0,0,0,0) 55%);}
  .flipper.turning .ff .shine{animation:gl .95s ease;}
  .flipper.turning .fb .shine{animation:gl2 .95s ease;}
  @keyframes gl{0%{opacity:0}50%{opacity:.45}100%{opacity:0}}
  @keyframes gl2{0%{opacity:.4}55%{opacity:.16}100%{opacity:0}}
  /* page frame */
  .pg{width:100%;height:100%;display:flex;flex-direction:column;padding:30px 32px 20px;}
  .kick{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);font-weight:bold;margin-bottom:5px;padding-right:78px;}
  .tocbtn{position:absolute;top:11px;right:13px;z-index:6;background:var(--navy);color:#fff;border:none;font-family:inherit;font-size:8px;font-weight:bold;letter-spacing:.06em;text-transform:uppercase;padding:5px 9px 5px 8px;border-radius:20px;cursor:pointer;opacity:.9;transition:.15s;box-shadow:0 2px 6px rgba(0,0,0,.25);}
  .tocbtn:hover{opacity:1;background:var(--orange);transform:translateY(-1px);}
  .tocwrap{display:flex;gap:15px;margin-top:2px;}
  .toccol{flex:1;min-width:0;}
  .tocpart{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);font-weight:800;margin:5px 0 6px;border-bottom:1px solid var(--line);padding-bottom:4px;}
  .tocrow{display:flex;align-items:center;gap:7px;padding:3.5px 5px;border-radius:4px;cursor:pointer;text-decoration:none;transition:background .15s;}
  .tocrow:hover{background:var(--peach);}
  .tocn{font-size:8.5px;font-weight:800;color:var(--orange);flex:0 0 16px;}
  .toct{font-size:9.7px;color:#1c1a15;font-weight:500;flex:1;line-height:1.2;}
  .tocrow:hover .toct{color:var(--navy);}
  .tocc{font-size:12px;color:var(--teall);flex:0 0 auto;font-weight:bold;}
  .tocrow:hover .tocc{color:var(--orange);}
  .ttl{font-size:22px;line-height:1.14;margin:0;color:var(--navy);font-weight:800;letter-spacing:-.2px;white-space:nowrap;}
  .subttl{font-size:12.5px;color:var(--muted);margin-top:4px;}
  .rule{height:3px;background:var(--orange);margin:11px 0 15px;border-radius:2px;}
  .rule.teal{background:var(--teal);}
  .pg p{font-size:13px;line-height:1.55;margin:0 0 9px;color:#1c1a15;font-weight:450;}
  .pg p b{color:var(--navy);font-weight:800;}
  .foot{display:flex;align-items:center;gap:10px;font-size:8.5px;color:var(--muted);
    letter-spacing:.02em;padding-top:9px;margin-top:auto;border-top:1px solid var(--line);}
  .foot .fl{flex:0 0 auto;}
  .foot .fc{flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .foot .fr{flex:0 0 auto;font-weight:bold;color:#4a4740;}
  .src{font-size:9.5px;color:var(--muted);font-style:italic;margin-top:8px;line-height:1.4;}
  .callout{background:var(--peach);border-left:4px solid var(--orange);padding:10px 13px;border-radius:0 4px 4px 0;font-size:11.7px;line-height:1.46;color:#201c15;margin-top:10px;font-weight:450;}
  .callout .ch{font-weight:bold;color:var(--oranged);display:block;margin-bottom:3px;font-size:11.5px;}
  .callout.navy{background:var(--navy);border-left-color:var(--orange);color:#e8eef0;}
  .callout.navy .ch{color:var(--gold);}
  /* stats */
  .stats{display:flex;gap:10px;margin:4px 0 6px;}
  .stat{flex:1;background:var(--card);border-radius:5px;padding:14px 8px 12px;text-align:center;position:relative;overflow:hidden;}
  .stat .bar{position:absolute;top:0;left:0;right:0;height:5px;}
  .stat .num{font-size:23px;font-weight:800;letter-spacing:-.5px;white-space:nowrap;}
  .stats.five .stat{padding:13px 4px 11px;}
  .stats.five .num{font-size:17px;letter-spacing:-.4px;}
  .stats.five .lbl{font-size:8.5px;}
  .stat .lbl{font-size:9.5px;color:#2b2822;margin-top:5px;line-height:1.25;text-transform:uppercase;letter-spacing:.03em;font-weight:600;}
  .stat .s{font-size:8px;color:#57514a;margin-top:6px;font-style:italic;}
  /* bars (horizontal) */
  .hbars{margin-top:6px;}
  .hbar{display:flex;align-items:center;margin:7px 0;font-size:11.5px;}
  .hbar .hl{width:150px;flex:0 0 150px;text-align:right;padding-right:10px;color:#1c1a15;font-weight:600;}
  .hbar .ht{flex:1;height:20px;background:#eee7d8;border-radius:3px;overflow:hidden;}
  .hbar .hf{height:100%;border-radius:3px;}
  .hbar .hv{width:40px;flex:0 0 40px;padding-left:8px;font-weight:bold;color:var(--navy);}
  /* funnel */
  .funnel{display:flex;gap:2px;margin:10px 0;}
  .fseg{flex:1;min-width:0;color:#fff;padding:16px 7px 16px 13px;clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 0 100%, 10px 50%);}
  .fseg:first-child{clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 0 100%);}
  .fseg:last-child{clip-path:polygon(0 0, 100% 0, 100% 100%, 0 100%, 10px 50%);padding-right:11px;}
  .fseg .ft{font-weight:800;font-size:8.7px;letter-spacing:0;text-transform:uppercase;line-height:1.14;}
  .fseg .fd{font-size:8px;margin-top:5px;opacity:1;line-height:1.2;}
  /* methods */
  .methods{display:flex;justify-content:space-between;align-items:flex-start;margin:14px 0;position:relative;}
  .mstep{flex:1;text-align:center;position:relative;z-index:2;}
  .mcirc{width:42px;height:42px;border-radius:50%;color:#fff;font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center;margin:0 auto 7px;}
  .mstep .mt{font-size:11px;font-weight:bold;color:var(--navy);}
  .mstep .md{font-size:9px;color:var(--muted);margin-top:2px;}
  .mline{position:absolute;top:21px;left:12%;right:12%;height:2px;background:var(--line);z-index:1;}
  /* grid cards */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:4px;}
  .gcard{border-top:3px solid var(--teal);background:#faf7f0;padding:9px 11px;border-radius:0 0 4px 4px;}
  .gcard:nth-child(even){border-top-color:var(--orange);}
  .gcard h4{margin:0 0 4px;font-size:11.5px;color:var(--navy);}
  .gcard p{font-size:10.2px;line-height:1.38;margin:0;color:#211e18;font-weight:450;}
  /* 3 cols */
  .cols3{display:flex;gap:10px;margin-top:6px;}
  .col{flex:1;background:#faf7f0;border-top:3px solid var(--orange);padding:11px;border-radius:0 0 4px 4px;}
  .col h4{margin:0 0 5px;font-size:12px;color:var(--navy);}
  .col p{font-size:10.5px;line-height:1.42;margin:0;color:#211e18;font-weight:450;}
  /* tables */
  table.t{width:100%;border-collapse:collapse;font-size:10px;margin-top:4px;}
  table.t th{background:var(--navy);color:#fff;text-align:left;padding:6px 7px;font-size:9.5px;font-weight:bold;}
  table.t td{padding:5px 7px;border-bottom:1px solid #eae3d3;vertical-align:top;line-height:1.32;color:#1a1712;font-weight:450;}
  table.t tr:nth-child(even) td{background:#faf7f0;}
  .rc{color:#fff;font-weight:800;text-align:center;border-radius:3px;padding:2px 0;font-size:11px;}
  .pill{color:#fff;font-weight:bold;text-align:center;border-radius:3px;padding:2px 4px;font-size:9px;display:inline-block;min-width:56px;}
  /* dashboard */
  .dash{margin-top:6px;}
  .drow{display:flex;align-items:center;margin:6px 0;font-size:10.5px;}
  .drow .dl{width:196px;flex:0 0 196px;color:#1c1a15;padding-right:8px;line-height:1.2;font-weight:500;}
  .drow .dt{flex:1;height:11px;background:#ece5d6;border-radius:6px;overflow:hidden;}
  .drow .df{height:100%;border-radius:6px;}
  .drow .dr{width:74px;flex:0 0 74px;text-align:right;font-weight:800;font-size:9px;}
  /* hours vertical chart */
  .vchart{display:flex;align-items:flex-end;justify-content:space-around;height:190px;gap:8px;margin:10px 0 4px;border-bottom:2px solid var(--line);padding:0 4px;}
  .vbar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
  .vbar .vv{font-size:10.5px;font-weight:800;color:var(--navy);margin-bottom:4px;}
  .vbar .vb{width:80%;border-radius:3px 3px 0 0;}
  .vbar .vl{font-size:9.3px;color:#171511;font-weight:600;margin-top:7px;text-align:center;line-height:1.22;}
  /* two column compare */
  .twocol{display:flex;gap:10px;margin-top:4px;}
  .tcbox{flex:1;border:1px solid var(--line);border-radius:5px;overflow:hidden;}
  .tcbox .tch{padding:8px 10px;font-weight:bold;font-size:11px;color:#fff;}
  .tcbox ul{margin:0;padding:9px 11px 9px 24px;}
  .tcbox li{font-size:9.8px;line-height:1.42;margin-bottom:5px;color:#201d17;font-weight:450;}
  /* triangle */
  .tri2{margin-top:2px;}
  .tri2 svg{display:block;margin:0 auto 12px;}
  .trirow{display:flex;gap:9px;}
  .trirow .trb{flex:1;}
  .trb{padding:9px 10px 10px;border-radius:0 0 4px 4px;font-size:9.6px;line-height:1.42;color:#201d17;font-weight:450;}
  .trb .th{font-weight:800;font-size:10.5px;display:block;margin-bottom:3px;}
  /* cover */
  .cover{width:100%;height:100%;background:linear-gradient(160deg,#1a4250 0%,#123039 55%,#0c222a 100%);color:#eef3f4;display:flex;flex-direction:column;padding:0;position:relative;overflow:hidden;}
  .cover .halo{position:absolute;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(209,99,43,.35),transparent 70%);top:-120px;right:-110px;}
  .cover .halo2{position:absolute;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(44,111,126,.4),transparent 70%);bottom:-70px;left:-60px;}
  .cbar{height:8px;background:var(--orange);}
  .chead{padding:26px 34px 0;position:relative;z-index:2;}
  .chead .nm{font-size:18.5px;font-weight:800;letter-spacing:.02em;color:#fff;}
  .chead .cr{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-top:3px;}
  .chead .ad{font-size:10.5px;color:#b9c9cd;font-style:italic;margin-top:3px;}
  .cmid{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 34px;position:relative;z-index:2;}
  .cmid .keyw{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;white-space:nowrap;}
  .cmid h1{font-size:58px;line-height:1.03;margin:0;color:#fff;font-weight:800;letter-spacing:-1.2px;}
  .cmid .lead{font-size:16px;color:#dde8ea;margin-top:26px;max-width:420px;line-height:1.55;}
  .cmid .tags{display:flex;gap:9px;margin-top:30px;flex-wrap:wrap;}
  .cmid .tag{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:#dfe8ea;border:1px solid rgba(232,161,31,.5);padding:6px 12px;border-radius:20px;}
  .cfoot{padding:0 34px 30px;position:relative;z-index:2;}
  .cfoot .line{height:1px;background:rgba(232,161,31,.4);margin-bottom:12px;}
  .cfoot .ct{font-size:10.5px;color:#cdd9db;line-height:1.7;}
  .cfoot .ct b{color:#fff;}
  /* CTA / back */
  .cta{width:100%;height:100%;background:linear-gradient(160deg,#123039 0%,#0c222a 100%);color:#dfe8ea;display:flex;flex-direction:column;padding:34px;position:relative;overflow:hidden;}
  .cta .halo{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(209,99,43,.25),transparent 70%);bottom:-120px;right:-90px;}
  .cta h2{font-size:24px;color:#fff;margin:0 0 4px;font-weight:800;position:relative;z-index:2;}
  .cta .mv{font-size:11px;color:var(--gold);margin-bottom:14px;position:relative;z-index:2;}
  .cta p{font-size:11.7px;color:#dae5e7;line-height:1.5;position:relative;z-index:2;}
  .cta .contact{margin-top:16px;position:relative;z-index:2;}
  .cta .contact .nm{font-size:15px;font-weight:800;color:#fff;}
  .cta .contact .cr{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin:3px 0 9px;}
  .cta .contact .row{font-size:11px;color:#d7e2e4;margin:3px 0;}
  .cta .contact .row b{color:var(--gold);font-weight:normal;margin-right:6px;}
  .cta a{color:var(--gold);text-decoration:none;}
  .cta a:hover{text-decoration:underline;}
  .cover a{color:inherit;text-decoration:none;}
  .cover a:hover{text-decoration:underline;}
  .cta a.cbtn{display:inline-block;margin-top:14px;background:var(--orange);color:#fff;font-weight:bold;font-size:12px;padding:11px 22px;border-radius:5px;letter-spacing:.03em;text-decoration:none;transition:.2s;}
  .cta a.cbtn:hover{background:#b64a1f;text-decoration:none;}
  .cta .disc{margin-top:auto;font-size:8.3px;color:#8ea3a7;line-height:1.4;border:1px solid rgba(232,161,31,.3);border-radius:4px;padding:9px 11px;position:relative;z-index:2;}
  .cta .disc b{color:#c9b47a;}
  /* controls */
  .progress{width:min(920px,92vw);height:4px;border-radius:3px;background:rgba(255,255,255,.12);overflow:hidden;}
  .progress > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--orange));transition:width .5s ease;}
  .controls{display:flex;align-items:center;gap:16px;}
  .btn{background:rgba(255,255,255,.07);border:1px solid rgba(232,161,31,.5);color:#eef3f4;font-family:inherit;font-size:14px;padding:8px 20px;border-radius:26px;cursor:pointer;transition:.2s;letter-spacing:.02em;}
  .btn:hover:not(:disabled){background:rgba(209,99,43,.28);transform:translateY(-1px);}
  .btn:disabled{opacity:.3;cursor:default;}
  .counter{font-size:12px;letter-spacing:.1em;min-width:170px;text-align:center;color:#bfcbce;}
  .hint{font-size:11px;color:#8ea3a7;letter-spacing:.04em;}
  .progress,.controls,.hint{position:relative;z-index:10;}
</style>
</head>
<body>
<div class="stage">
  <div class="scaler" id="scaler">
    <div class="book closed" id="book">
      <div class="side left" id="leftPage"></div>
      <div class="side right" id="rightPage"></div>
      <div class="flipper" id="flipper">
        <div class="fface ff" id="ff"><div class="shine"></div></div>
        <div class="fface fb" id="fb"><div class="shine"></div></div>
      </div>
    </div>
  </div>
  <div class="progress"><i id="bar"></i></div>
  <div class="controls">
    <button class="btn" id="home">Front cover</button>
    <button class="btn" id="prev">‹ Back</button>
    <div class="counter" id="counter"></div>
    <button class="btn" id="next">Next ›</button>
    <button class="btn" id="end">Back cover</button>
  </div>
  <div class="hint">Click the cover to open · then click a page edge, use the buttons, or press ← / →</div>
</div>

<script>
const NAVY='#14343f',TEAL='#2c6f7e',TEALL='#6ba3ad',ORANGE='#d1632b',RUST='#a83e26',GOLD='#e8a11f';
const rateColor={Critical:'#a83e26','Critical Gap':'#a83e26',High:'#d1632b','Med-High':'#e8a11f','Medium-High':'#e8a11f',Medium:'#2c6f7e',Low:'#6ba3ad'};
function heatColor(s){return s>=20?'#a83e26':s>=16?'#c85a2b':s>=12?'#d98a3f':s>=9?'#cbb96a':s>=5?'#7faaa0':'#3f7f8a';}

/* ---------- components ---------- */
function C_stats(rows){ // rows: array of arrays of cards
  return rows.map(cards=>`<div class="stats${cards.length>=5?' five':''}">`+cards.map(c=>
    `<div class="stat"><div class="bar" style="background:${c.color}"></div><div class="num" style="color:${c.color}">${c.num}</div><div class="lbl">${c.label}</div>${c.s?`<div class="s">${c.s}</div>`:''}</div>`).join('')+`</div>`).join('');
}
function C_hbars(items){
  const max=Math.max(...items.map(i=>i.v));
  return `<div class="hbars">`+items.map(i=>
    `<div class="hbar"><div class="hl">${i.l}</div><div class="ht"><div class="hf" style="width:${(i.v/max*100).toFixed(0)}%;background:${i.c}"></div></div><div class="hv">${i.v}%</div></div>`).join('')+`</div>`;
}
function C_funnel(segs){
  return `<div class="funnel">`+segs.map(s=>
    `<div class="fseg" style="background:${s.c}"><div class="ft">${s.t}</div><div class="fd">${s.d}</div></div>`).join('')+`</div>`;
}
function C_methods(steps){
  return `<div class="methods"><div class="mline"></div>`+steps.map(s=>
    `<div class="mstep"><div class="mcirc" style="background:${s.c}">${s.n}</div><div class="mt">${s.t}</div><div class="md">${s.d}</div></div>`).join('')+`</div>`;
}
function C_grid(cards){
  return `<div class="grid">`+cards.map(c=>`<div class="gcard"><h4>${c.h}</h4><p>${c.p}</p></div>`).join('')+`</div>`;
}
function C_cols3(cols){
  return `<div class="cols3">`+cols.map(c=>`<div class="col"><h4>${c.h}</h4><p>${c.p}</p></div>`).join('')+`</div>`;
}
function C_table(o){
  let h=`<table class="t"><thead><tr>`+o.head.map((x,i)=>`<th${o.w&&o.w[i]?` style="width:${o.w[i]}"`:''}>${x}</th>`).join('')+`</tr></thead><tbody>`;
  o.rows.forEach(r=>{ h+='<tr>'+r.map((cell,i)=>{
    if(o.scoreCol===i) return `<td><div class="rc" style="background:${heatColor(+cell)}">${cell}</div></td>`;
    if(o.rateCol===i) return `<td><span class="pill" style="background:${rateColor[cell]||'#777'}">${cell}</span></td>`;
    return `<td>${cell}</td>`; }).join('')+'</tr>'; });
  return h+`</tbody></table>`;
}
function C_heat(){
  const c=52,ox=70,oy=10;let cells='',yl='',xl='';
  const marks={ '5,5':'R-01,R-02','4,5':'R-06','3,5':'R-03,R-08','3,4':'R-04,R-05,R-07','3,3':'R-10','2,4':'R-09' };
  for(let r=0;r<5;r++){const like=5-r;for(let k=0;k<5;k++){const imp=k+1,s=like*imp,x=ox+k*c,y=oy+r*c;
    const key=like+','+imp,m=marks[key];
    cells+=`<rect x="${x}" y="${y}" width="${c-3}" height="${c-3}" rx="3" fill="${heatColor(s)}"/><text x="${x+(c-3)/2}" y="${y+(m?18:26)}" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#fff">${s}</text>${m?`<text x="${x+(c-3)/2}" y="${y+34}" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">${m}</text>`:''}`;}}
  const yn=['Very High (5)','Med-High (4)','Medium (3)','Low-Med (2)','Low (1)'];
  for(let r=0;r<5;r++) yl+=`<text x="${ox-6}" y="${oy+r*c+30}" text-anchor="end" font-family="Arial" font-size="8.5" fill="#555">${yn[r]}</text>`;
  const xn=['Negligible','Minor','Moderate','Major','Severe'];
  for(let k=0;k<5;k++) xl+=`<text x="${ox+k*c+(c-3)/2}" y="${oy+5*c+15}" text-anchor="middle" font-family="Arial" font-size="8.5" fill="#555">${xn[k]} (${k+1})</text>`;
  return `<svg viewBox="0 0 340 300" width="360" style="display:block;margin:6px auto 0">${cells}${yl}${xl}
    <text x="14" y="${oy+2.5*c}" text-anchor="middle" font-family="Arial" font-size="9" fill="#14343f" font-weight="bold" transform="rotate(-90 14 ${oy+2.5*c})">LIKELIHOOD</text>
    <text x="${ox+2.5*c}" y="${oy+5*c+30}" text-anchor="middle" font-family="Arial" font-size="9" fill="#14343f" font-weight="bold">IMPACT</text></svg>`;
}

    <div class="foot"><span class="fl">Craig Mann, CCA, CCP, CFE, PMP</span><span class="fc">${p.foot||''}</span><span class="fr">Page ${num} of ${total}</span></div></div>`;

/* ---------- engine ---------- */
const pages=P, S=Math.ceil(pages.length/2);
const L=document.getElementById('leftPage'),R=document.getElementById('rightPage');
const flip=document.getElementById('flipper'),FF=document.getElementById('ff'),FBk=document.getElementById('fb');
const prevBtn=document.getElementById('prev'),nextBtn=document.getElementById('next'),homeBtn=document.getElementById('home'),endBtn=document.getElementById('end');
const counter=document.getElementById('counter'),bar=document.getElementById('bar');
let s=0,busy=false,closed=true,curK=1; const PW=500;
const bookEl=document.getElementById('book'), scaler=document.getElementById('scaler');
function c(i){ return (i>=0&&i<pages.length)? pageHTML(pages[i],i) : '<div style="width:100%;height:100%"></div>'; }
function fitTitles(){ document.querySelectorAll('#book .ttl').forEach(el=>{ if(!el.clientWidth) return; el.style.fontSize='22px'; let fs=22,g=0; while(el.scrollWidth>el.clientWidth+0.5 && fs>13 && g<40){ fs-=0.5; el.style.fontSize=fs+'px'; g++; } }); }
const tocIdx=P.findIndex(p=>p&&p.type==='toc'), TOC_SPREAD=tocIdx>=0?Math.floor(tocIdx/2):0;
function gotoSpread(n){ if(busy)return; if(n<0)n=0; if(n>S-1)n=S-1; bookEl.classList.remove('closed'); closed=false; s=n; renderStatic(); fit(); }
function gotoTOC(){ gotoSpread(TOC_SPREAD); }
function ui(){
  prevBtn.disabled=closed;
  homeBtn.disabled=closed;
  endBtn.disabled=(!closed && s===S-1);
  nextBtn.disabled=(!closed && s===S-1);
  nextBtn.textContent=closed?'Open the book ›':'Next ›';
  if(closed){ counter.textContent='Cover · click to open'; bar.style.width='0%'; }
  else { counter.textContent = s===0?'Cover' : s===S-1?'Contact' : 'Spread '+s+' / '+(S-1); bar.style.width=(s/(S-1)*100)+'%'; }
}
function renderStatic(){ const alone=(2*s+1>=pages.length); L.innerHTML=c(2*s); R.innerHTML=c(2*s+1); bookEl.classList.toggle('single', alone&&!closed); fitTitles(); ui(); }
function finish(cb){ let d=false; const e=()=>{ if(d)return; d=true; flip.removeEventListener('transitionend',e); cb(); };
  flip.addEventListener('transitionend',e); setTimeout(e,1050); }
function open(){ if(busy||!closed)return; busy=true;
  L.innerHTML=c(0); R.innerHTML=c(1); bookEl.classList.remove('closed');
  setTimeout(()=>{ closed=false; s=0; renderStatic(); busy=false; }, 880); }
function close(){ if(busy||closed)return; busy=true; s=0; L.innerHTML=c(0); R.innerHTML=c(1);
  bookEl.classList.add('closed');
  setTimeout(()=>{ closed=true; renderStatic(); busy=false; }, 880); }
function next(){ if(busy||closed||s>=S-1)return; busy=true;
  if(2*(s+1)+1>=pages.length){ s++; renderStatic(); fit(); busy=false; return; }
  FF.innerHTML=c(2*s+1)+'<div class="shine"></div>'; FBk.innerHTML=c(2*s+2)+'<div class="shine"></div>';
  R.innerHTML=c(2*s+3);
  flip.style.transformOrigin='left center'; flip.style.left=PW+'px'; flip.style.display='block'; flip.style.transform='rotateY(0deg)';
  fitTitles(); void flip.offsetWidth; flip.classList.add('turning'); flip.style.transform='rotateY(-180deg)';
  finish(()=>{ s++; renderStatic(); flip.style.display='none'; flip.classList.remove('turning'); busy=false; }); }
function prev(){ if(busy||closed)return; if(s<=0){ close(); return; } busy=true;
  if(2*s+1>=pages.length){ s--; renderStatic(); fit(); busy=false; return; }
  FF.innerHTML=c(2*s)+'<div class="shine"></div>'; FBk.innerHTML=c(2*s-1)+'<div class="shine"></div>';
  L.innerHTML=c(2*s-2);
  flip.style.transformOrigin='right center'; flip.style.left='0px'; flip.style.display='block'; flip.style.transform='rotateY(0deg)';
  fitTitles(); void flip.offsetWidth; flip.classList.add('turning'); flip.style.transform='rotateY(180deg)';
  finish(()=>{ s--; renderStatic(); flip.style.display='none'; flip.classList.remove('turning'); busy=false; }); }
function goNext(){ closed?open():next(); }
function goPrev(){ if(!closed) prev(); }
function gotoBack(){ if(busy||(!closed && s===S-1))return; bookEl.classList.remove('closed'); closed=false; s=S-1; renderStatic(); fit(); }
nextBtn.onclick=goNext; prevBtn.onclick=goPrev; homeBtn.onclick=()=>{ if(!closed) close(); }; endBtn.onclick=gotoBack;
document.addEventListener('keydown',e=>{ if(e.key==='ArrowRight')goNext(); if(e.key==='ArrowLeft')goPrev(); });
bookEl.addEventListener('click',e=>{ if(busy)return; if(closed){ open(); return; } const r=e.currentTarget.getBoundingClientRect();
  (e.clientX-r.left>r.width/2)?next():prev(); });
function fit(){ const H=684;
  const availW=window.innerWidth-40, availH=window.innerHeight-150;
  let k=Math.min(availW/1000, availH/H); k=Math.min(k,2.4); if(k<0.1)k=0.1; curK=k;
  scaler.style.transform='scale('+k+')'; scaler.style.width=(1000*k)+'px'; scaler.style.height=(H*k)+'px'; }
window.addEventListener('resize',fit); fit(); renderStatic();
</script>

<script>
/* ---- COPY / PRINT / SAVE PROTECTION ---- */
// Disable right-click context menu
document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; });

// Disable text selection
document.addEventListener('selectstart', function(e){ e.preventDefault(); return false; });

// Block keyboard shortcuts
document.addEventListener('keydown', function(e){
  // Block Ctrl+P (print), Ctrl+S (save), Ctrl+C (copy), Ctrl+U (view source)
  // Ctrl+A (select all), Ctrl+X (cut), F12 (devtools), Ctrl+Shift+I (devtools)
  if(e.ctrlKey && (e.key==='p'||e.key==='s'||e.key==='c'||e.key==='u'||e.key==='a'||e.key==='x')){
    e.preventDefault(); e.stopPropagation(); return false;
  }
  if(e.ctrlKey && e.shiftKey && (e.key==='I'||e.key==='i'||e.key==='J'||e.key==='j'||e.key==='C'||e.key==='c')){
    e.preventDefault(); e.stopPropagation(); return false;
  }
  if(e.key==='F12'||e.key==='PrintScreen'){
    e.preventDefault(); e.stopPropagation(); return false;
  }
  // Block Cmd equivalents on Mac
  if(e.metaKey && (e.key==='p'||e.key==='s'||e.key==='c'||e.key==='u'||e.key==='a'||e.key==='x')){
    e.preventDefault(); e.stopPropagation(); return false;
  }
});

// Block print via window.print()
window.onbeforeprint = function(){ return false; };
window.addEventListener('beforeprint', function(e){ e.preventDefault(); e.stopPropagation(); });

// Disable drag
document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; });

// CSS to disable selection and printing
const protStyle = document.createElement('style');
protStyle.textContent = `
  * { -webkit-user-select: none !important; -moz-user-select: none !important; -ms-user-select: none !important; user-select: none !important; }
  @media print { body { display: none !important; } }
`;
document.head.appendChild(protStyle);
/* ---- END PROTECTION ---- */
</script>
</body>
</html>
